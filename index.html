<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXHC.PL | Najlepszy Serwer Anarchia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-blue: #00a2ff;
            --discord: #5865F2;
            --green-shop: #2eff8c;
            --social-pink: #ff4db8;
            --lux-purple: #9c27b0;
            --yellow-btn: #ffcc00;
            --light-blue: #5ba6ff;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        body { background-color: #f8faf9; font-family: 'Poppins', sans-serif; margin: 0; scroll-behavior: smooth; overflow-x: hidden; }

        /* --- NAWIGACJA --- */
        .header-nav { 
            display: flex; gap: 40px; justify-content: center; padding: 25px 0; background: white;
            font-weight: 900; text-transform: uppercase; align-items: center; position: sticky;
            top: 0; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .header-nav a { text-decoration: none; color: #333; transition: 0.3s; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .header-nav a:hover { color: var(--main-blue); }

        /* --- HERO SECTION (USUNIĘTE SZARE, ZOSTAŁO BŁĘKITNE) --- */
        .landing-page { 
            display: flex; justify-content: center; align-items: center; padding: 60px 20px; 
            background: white; 
        }

        .hero-box {
            background-image: url('tlo.png'); 
            background-size: cover; 
            background-position: center;
            border-radius: 35px; 
            width: 100%;
            max-width: 1100px;
            padding: 80px 40px; 
            text-align: center; 
            color: white;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            animation: fadeInUp 0.8s ease-out;
            position: relative;
        }

        .hero-box img { width: 160px; margin-bottom: 20px; animation: float 4s infinite ease-in-out; }
        .hero-box h1 { font-size: 4.5rem; margin: 10px 0; font-weight: 900; letter-spacing: 2px; text-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .ip-btn { 
            background: var(--light-blue); color: white; border: none; padding: 18px 50px; 
            border-radius: 15px; font-weight: 900; font-size: 1.3rem; cursor: pointer;
            transition: 0.4s; box-shadow: 0 10px 25px rgba(91, 166, 255, 0.4);
            margin-top: 20px;
        }
        .ip-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* --- SKLEP I RESZTA --- */
        .container { max-width: 1100px; margin: 60px auto; width: 95%; opacity: 0; transform: translateY(30px); transition: 1s; }
        .container.visible { opacity: 1; transform: translateY(0); }

        .section-title { text-align: center; margin-bottom: 40px; text-transform: uppercase; font-weight: 900; font-size: 2.2rem; color: #222; }

        .grid-items { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .item-card { background: white; padding: 30px; border-radius: 25px; border: 1px solid #eee; text-align: center; transition: 0.3s; }
        .item-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .buy-btn { 
            background: var(--yellow-btn); border: none; width: 100%; padding: 15px; 
            font-weight: 900; cursor: pointer; border-radius: 12px; margin-top: 20px;
            font-size: 1rem; transition: 0.3s;
        }
        .buy-btn:hover { filter: brightness(1.05); }

        /* --- KOSZYK I TOAST --- */
        #toast { visibility: hidden; background: #111; color: #fff; padding: 15px 30px; border-radius: 50px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 7000; font-weight: 900; }
        #toast.show { visibility: visible; animation: fadeInUp 0.4s; }

        footer { text-align: center; padding: 60px 0; color: #bbb; font-size: 0.9rem; font-weight: 700; }

        #cart-sidebar {
            position: fixed; top: 0; right: -400px; width: 350px; height: 100vh;
            background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.1); z-index: 5000;
            transition: 0.4s; padding: 30px; display: flex; flex-direction: column;
        }
        #cart-sidebar.active { right: 0; }
    </style>
</head>
<body>

<nav class="header-nav">
    <a href="#shop">SKLEP</a>
    <img src="image_efc264.png" height="40">
    <a onclick="openCart()">KOSZYK</a>
    <a href="https://discord.gg/YCGZD43BVA" target="_blank" style="color:var(--discord)">
        <span>💬</span> DISCORD <!-- Tu jest Twój "Ludzik/Ikona" -->
    </a>
</nav>

<section class="landing-page">
    <div class="hero-box">
        <img src="image_efc264.png">
        <h1>LUXHC.PL</h1>
        <button class="ip-btn" onclick="copyIP()">IP: LUXHC.PL</button>
    </div>
</section>

<div id="shop" class="container">
    <h2 class="section-title">🛒 DOSTĘPNE PAKIETY</h2>
    <div class="grid-items">
        <div class="item-card"><h3>VIP</h3><p>Ranga na 30 dni</p><button class="buy-btn" onclick="addToCart('VIP', 14.99)">14.99 ZŁ</button></div>
        <div class="item-card"><h3>SVIP</h3><p>Ranga na 30 dni</p><button class="buy-btn" onclick="addToCart('SVIP', 39.99)">39.99 ZŁ</button></div>
        <div class="item-card"><h3>LUX</h3><p>Stała ranga Premium</p><button class="buy-btn" onclick="addToCart('LUX', 59.99)">59.99 ZŁ</button></div>
    </div>
</div>

<div id="cart-sidebar">
    <h2 style="font-weight:900;">TWÓJ KOSZYK</h2>
    <div id="cart-items-list" style="flex:1;"></div>
    <button class="buy-btn" style="background:var(--discord); color:white;" onclick="checkout()">FINALIZUJ NA DISCORDZIE</button>
    <button class="buy-btn" style="background:#eee; color:#333;" onclick="closeCart()">ZAMKNIJ</button>
</div>

<footer>&copy; 2026 LUXHC.PL - OFICJALNY SKLEP SERWERA</footer>

<div id="toast">SKOPIOWANO!</div>

<script>
    let cart = [];

    function addToCart(name, price) {
        cart.push({name, price});
        showToast("DODANO: " + name);
        updateCart();
        openCart();
    }

    function updateCart() {
        const list = document.getElementById('cart-items-list');
        list.innerHTML = cart.length === 0 ? '<p>Koszyk jest pusty</p>' : 
            cart.map(item => `<div style="padding:10px 0; border-bottom:1px solid #eee;"><b>${item.name}</b> - ${item.price} zł</div>`).join('');
    }

    function openCart() { document.getElementById('cart-sidebar').classList.add('active'); }
    function closeCart() { document.getElementById('cart-sidebar').classList.remove('active'); }

    function copyIP() {
        navigator.clipboard.writeText("LUXHC.PL");
        showToast("🌐 SKOPIOWANO IP!");
    }

    function checkout() {
        if(cart.length === 0) return alert("Koszyk jest pusty!");
        const txt = "ZAMÓWIENIE: " + cart.map(i => i.name).join(", ");
        navigator.clipboard.writeText(txt);
        alert("Skopiowano zamówienie do schowka! Teraz wklej je na naszym kanale Discord.");
        window.open('https://discord.gg/YCGZD43BVA', '_blank');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    window.addEventListener('scroll', () => {
        const shop = document.getElementById('shop');
        if (shop.getBoundingClientRect().top < window.innerHeight - 50) {
            shop.classList.add('visible');
        }
    });
</script>

</body>
</html>
