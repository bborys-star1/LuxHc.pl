<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXHC.PL | Najlepsza Anarchia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-blue: #00a2ff;
            --discord-blurple: #5865F2;
            --green-shop: #2eff8c;
            --social-pink: #ff4db8;
            --yellow-accent: #ffcc00;
        }

        @keyframes floatLudzik {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        body { background-color: #f4f7f6; font-family: 'Poppins', sans-serif; margin: 0; scroll-behavior: smooth; overflow-x: hidden; }

        /* --- NAWIGACJA --- */
        .header-nav { 
            display: flex; gap: 40px; justify-content: center; padding: 20px 0; background: white;
            font-weight: 900; text-transform: uppercase; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .header-nav a { text-decoration: none; color: #333; transition: 0.3s; cursor: pointer; font-size: 0.9rem; position: relative; }
        #cart-dot { position: absolute; top: -10px; right: -15px; background: #ff4d4d; color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; display: none; }

        /* --- GÓRNY BANNER (Tło tlo.png) --- */
        .landing-page { padding: 60px 0; display: flex; justify-content: center; background: white; }
        .main-hero-container { display: flex; gap: 20px; max-width: 1300px; width: 95%; height: 500px; }

        .hero-box {
            flex: 2; padding: 40px; text-align: center; color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-image: url('tlo.png'); /* ZMIENIONO NA tlo.png */
            background-size: cover;
            background-position: center;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .hero-box img { width: 140px; margin-bottom: 20px; }
        .hero-box h1 { font-size: 4rem; margin: 10px 0; font-weight: 900; letter-spacing: 2px; }
        .ip-btn { background: #4da6ff; color: white; border: none; padding: 15px 40px; border-radius: 15px; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }

        .hero-side-btns { flex: 0.8; display: flex; flex-direction: column; gap: 20px; }
        .side-btn { flex: 1; border-radius: 35px; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 1.5rem; text-decoration: none; transition: 0.4s; text-transform: uppercase; }
        .btn-shop { background: var(--green-shop); color: #000; }
        .btn-social { background: var(--social-pink); color: white; }

        /* --- SKLEP --- */
        .container { max-width: 1200px; margin: 80px auto; width: 95%; }
        .section-title { text-align: center; font-weight: 900; font-size: 2.5rem; margin-bottom: 40px; text-transform: uppercase; }
        .grid-items { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .item-card { background: white; padding: 40px; border-radius: 35px; border: 1px solid #eee; text-align: center; transition: 0.4s; }
        .buy-btn { background: var(--yellow-accent); border: none; width: 100%; padding: 18px; font-weight: 900; cursor: pointer; border-radius: 15px; margin-top: 20px; }

        /* --- DISCORD (CZARNY) --- */
        .discord-section {
            max-width: 1300px; width: 95%; margin: 50px auto; padding: 60px;
            display: flex; align-items: center; position: relative; overflow: hidden;
            background: #000000; 
            border-radius: 40px;
        }
        .discord-content { display: flex; align-items: center; justify-content: center; gap: 80px; width: 100%; z-index: 5; }
        .ludzik-img { width: 250px; animation: floatLudzik 3s infinite ease-in-out; }
        .discord-info { color: white; text-align: center; }
        .discord-info h2 { font-size: 2.5rem; margin: 0; font-weight: 900; text-transform: uppercase; }
        .members-count { font-size: 5rem; font-weight: 900; line-height: 1; display: block; margin: 10px 0; }
        .join-btn { background: white; color: black; padding: 18px 50px; border-radius: 20px; text-decoration: none; font-weight: 900; display: inline-block; margin-top: 20px; transition: 0.3s; }

        /* --- KOSZYK I TOAST --- */
        #cart-sidebar { position: fixed; top: 0; right: -450px; width: 400px; max-width: 100%; height: 100vh; background: white; z-index: 5000; transition: 0.5s; padding: 40px; display: flex; flex-direction: column; box-shadow: -15px 0 40px rgba(0,0,0,0.1); }
        #cart-sidebar.active { right: 0; }
        #toast { visibility: hidden; background: #111; color: #fff; padding: 15px 40px; border-radius: 50px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; font-weight: 900; }
        #toast.show { visibility: visible; }

        footer { text-align: center; padding: 40px 0; color: #bbb; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="cart-sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="margin:0; font-weight:900;">KOSZYK</h2>
        <span onclick="toggleCart()" style="cursor:pointer; font-size:2.5rem;">&times;</span>
    </div>
    <div id="cart-list" style="flex:1; overflow-y:auto;"></div>
    <div style="border-top:2px solid #f9f9f9; padding-top:20px;">
        <div style="display:flex; justify-content:space-between; font-size:1.5rem; font-weight: 900; margin-bottom:20px;">
            <span>SUMA:</span>
            <span id="total-price" style="color: var(--main-blue);">0.00 ZŁ</span>
        </div>
        <button onclick="checkout()" style="width:100%; background:var(--discord-blurple); color:white; border:none; padding:20px; border-radius:20px; font-weight:900; cursor:pointer;">FINALIZUJ ZAKUP</button>
    </div>
</div>

<nav class="header-nav">
    <a href="#shop">SKLEP</a>
    <img src="image_efc264.png" height="45">
    <a onclick="toggleCart()">KOSZYK <span id="cart-dot">0</span></a>
    <a href="https://guns.lol/m1czzzzz" target="_blank" style="color:var(--social-pink)">SOCIALE</a>
</nav>

<section class="landing-page">
    <div class="main-hero-container">
        <div class="hero-box">
            <img src="image_efc264.png">
            <h1>LUXHC.PL</h1>
            <button class="ip-btn" onclick="copyIP()">IP: LUXHC.PL</button>
        </div>
        <div class="hero-side-btns">
            <a href="#shop" class="side-btn btn-shop">SKLEP</a>
            <a href="https://guns.lol/m1czzzzz" target="_blank" class="side-btn btn-social">SOCIALE</a>
        </div>
    </div>
</section>

<div id="shop" class="container">
    <h2 class="section-title">💎 Oferta Serwera</h2>
    <div class="grid-items">
        <div class="item-card">
            <h3>RANGA VIP</h3>
            <h2 style="color:var(--main-blue);">14.99 ZŁ</h2>
            <button class="buy-btn" onclick="addToCart('RANGA VIP', 14.99)">DODAJ DO KOSZYKA</button>
        </div>
        <div class="item-card">
            <h3>RANGA LUX</h3>
            <h2 style="color:var(--main-blue);">59.99 ZŁ</h2>
            <button class="buy-btn" onclick="addToCart('RANGA LUX', 59.99)">DODAJ DO KOSZYKA</button>
        </div>
        <div class="item-card">
            <h3>KLUCZE</h3>
            <h2 style="color:var(--main-blue);">9.99 ZŁ</h2>
            <button class="buy-btn" onclick="addToCart('KLUCZE', 9.99)">DODAJ DO KOSZYKA</button>
        </div>
    </div>
</div>

<section class="discord-section">
    <div class="discord-content">
        <img src="ludzik discord.png" class="ludzik-img">
        <div class="discord-info">
            <h2>NASZ SERWER DISCORD</h2>
            <div>
                <span id="discord-count" class="members-count">...</span>
                <span style="color: #00a2ff; font-weight: 900; letter-spacing: 2px;">OSÓB ONLINE</span>
            </div>
            <a href="https://discord.gg/YCGZD43BVA" target="_blank" class="join-btn">DOŁĄCZ DO NAS</a>
        </div>
    </div>
</section>

<footer>&copy; 2026 LUXHC.PL</footer>

<div id="toast">POWIADOMIENIE</div>

<script>
    const SERVER_ID = "1481567847137153097"; 

    async function fetchDiscord() {
        try {
            const r = await fetch(`https://discord.com/api/guilds/${SERVER_ID}/widget.json`);
            const d = await r.json();
            document.getElementById('discord-count').innerText = d.presence_count;
        } catch (e) {
            document.getElementById('discord-count').innerText = "ONLINE";
        }
    }
    fetchDiscord();
    setInterval(fetchDiscord, 30000);

    let cart = [];
    function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }
    function addToCart(name, price) {
        cart.push({ id: Date.now(), name, price });
        updateCartUI();
        showToast(`🛒 Dodano: ${name}`);
    }
    function updateCartUI() {
        const list = document.getElementById('cart-list');
        const dot = document.getElementById('cart-dot');
        const totalEl = document.getElementById('total-price');
        dot.style.display = cart.length > 0 ? 'block' : 'none';
        dot.innerText = cart.length;
        let total = 0;
        list.innerHTML = "";
        cart.forEach(item => {
            total += item.price;
            list.innerHTML += `<div style="background:#f9f9f9; padding:10px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between;"><span>${item.name}</span><b>${item.price} ZŁ</b></div>`;
        });
        totalEl.innerText = total.toFixed(2) + " ZŁ";
    }
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }
    function copyIP() {
        navigator.clipboard.writeText("LUXHC.PL");
        showToast("✅ SKOPIOWANO IP");
    }
    function checkout() {
        showToast("📋 SKOPIOWANO ZAMÓWIENIE!");
        window.open('https://discord.gg/YCGZD43BVA', '_blank');
    }
</script>

</body>
</html>
